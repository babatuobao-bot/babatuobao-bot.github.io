<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>五运六气 · 黄帝内经运气学说</title>

<!-- 引入复古中文字体 -->


<style>
  /* ========== 基础重置 ========== */
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  /* ========== 古典配色 ========== */
  :root {
    --paper: #f5f0e1;
    --paper-dark: #e8dcc8;
    --ink: #2c2418;
    --ink-light: #5c4f3d;
    --ink-faint: #8a7d6b;
    --red-seal: #c23b27;
    --gold: #b8952a;
    --gold-light: #d4b96a;
    --border: #c4b494;
    --border-light: #ddd2be;
    --shadow: rgba(44, 36, 24, 0.12);
    --bg-deep: #3a3020;
    --accent-blue: #3a6070;
    --accent-green: #5a7a5a;
    --accent-warm: #8b4513;
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: "Noto Serif SC", "STKaiti", "KaiTi", "楷体", "SimSun", "宋体", serif;
    background: var(--paper);
    color: var(--ink);
    line-height: 1.8;
    min-height: 100vh;
  }

  /* ========== 背景纹理 ========== */
  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background:
      radial-gradient(ellipse at 20% 50%, rgba(184, 149, 42, 0.05) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 20%, rgba(58, 96, 112, 0.04) 0%, transparent 50%),
      repeating-linear-gradient(
        0deg,
        transparent,
        transparent 28px,
        rgba(196, 180, 148, 0.08) 28px,
        rgba(196, 180, 148, 0.08) 29px
      );
    pointer-events: none;
    z-index: -1;
  }

  /* ========== 容器 ========== */
  .container {
    max-width: 900px;
    margin: 0 auto;
    padding: 0 24px;
  }

  /* ========== 页首 ========== */
  header {
    text-align: center;
    padding: 56px 24px 40px;
    position: relative;
    background:
      linear-gradient(180deg, rgba(58, 48, 32, 0.97) 0%, rgba(74, 62, 46, 0.95) 50%, rgba(232, 220, 200, 0.3) 100%),
      url("data:image/svg+xml,%3Csvg width='100' height='100' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M50 10 Q30 30 50 50 Q70 30 50 10z' fill='none' stroke='%23d4b96a15' stroke-width='0.5'/%3E%3C/svg%3E");
    color: var(--paper);
    border-bottom: 3px double var(--gold);
  }

  header::before {
    content: '';
    position: absolute;
    top: 16px; left: 50%;
    transform: translateX(-50%);
    width: 120px; height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }

  .header-ornament {
    font-family: "Noto Serif SC", "STSong", "SimSun", serif;
    font-size: 14px;
    color: var(--gold-light);
    letter-spacing: 16px;
    margin-bottom: 20px;
    opacity: 0.7;
  }

  header h1 {
    font-family: "KaiTi", "STKaiti", "KaiTi_GB2312", "AR PL UKai CN", "AR PL UKai HK", "SimSun", serif;
    font-size: clamp(2.4rem, 7vw, 4rem);
    font-weight: 400;
    letter-spacing: 0.35em;
    text-shadow: 0 2px 12px rgba(0,0,0,0.4);
    margin-bottom: 10px;
    background: linear-gradient(180deg, #fff8e8 30%, #d4b96a 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  header .subtitle {
    font-family: "Noto Serif SC", "STSong", "SimSun", serif;
    font-size: 1rem;
    color: var(--gold-light);
    letter-spacing: 0.3em;
    font-weight: 300;
    opacity: 0.85;
  }

  .seal {
    display: inline-block;
    border: 2px solid var(--red-seal);
    color: var(--red-seal);
    padding: 6px 10px;
    font-family: "KaiTi", "STKaiti", "KaiTi_GB2312", "SimSun", serif;
    font-size: 0.85rem;
    letter-spacing: 3px;
    transform: rotate(-3deg);
    margin-top: 18px;
    opacity: 0.8;
    border-radius: 2px;
  }

  /* ========== 导航标签 ========== */
  .tabs {
    display: flex;
    justify-content: center;
    gap: 0;
    padding: 0;
    background: linear-gradient(180deg, var(--paper-dark) 0%, var(--paper) 100%);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 12px var(--shadow);
  }

  .tab-btn {
    padding: 16px 36px;
    border: none;
    background: transparent;
    font-family: "Noto Serif SC", "STSong", "SimSun", serif;
    font-size: 1.05rem;
    color: var(--ink-faint);
    cursor: pointer;
    letter-spacing: 0.2em;
    position: relative;
    transition: all 0.3s ease;
    white-space: nowrap;
  }

  .tab-btn:hover {
    color: var(--ink);
    background: rgba(184, 149, 42, 0.06);
  }

  .tab-btn.active {
    color: var(--ink);
    background: var(--paper);
  }

  .tab-btn.active::after {
    content: '';
    position: absolute;
    bottom: 0; left: 25%; right: 25%;
    height: 2px;
    background: var(--gold);
  }

  .tab-icon {
    margin-right: 6px;
    font-size: 1.1rem;
  }

  /* ========== 内容面板 ========== */
  .panel {
    display: none;
    padding: 40px 0 60px;
    animation: fadeIn 0.5s ease;
  }

  .panel.active { display: block; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ========== 卷轴式卡片 ========== */
  .scroll-card {
    background:
      linear-gradient(135deg, #fffdf7 0%, #f8f3e8 40%, var(--paper) 100%);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 36px 32px;
    margin-bottom: 28px;
    position: relative;
    box-shadow:
      0 3px 16px var(--shadow),
      inset 0 0 40px rgba(232, 220, 200, 0.3),
      inset 0 1px 0 rgba(255,255,255,0.6);
  }

  /* 卷轴装饰角 */
  .scroll-card::before,
  .scroll-card::after {
    content: '';
    position: absolute;
    width: 24px; height: 24px;
    border-color: var(--gold-light);
    opacity: 0.4;
  }
  .scroll-card::before {
    top: 8px; left: 8px;
    border-top: 1px solid;
    border-left: 1px solid;
  }
  .scroll-card::after {
    bottom: 8px; right: 8px;
    border-bottom: 1px solid;
    border-right: 1px solid;
  }

  .section-title {
    text-align: center;
    font-family: "KaiTi", "STKaiti", "KaiTi_GB2312", "Noto Serif SC", serif;
    font-size: 1.5rem;
    font-weight: 400;
    color: var(--ink);
    letter-spacing: 0.3em;
    margin-bottom: 28px;
    padding-bottom: 14px;
    border-bottom: 1px solid var(--border-light);
    position: relative;
  }

  .section-title::after {
    content: '';
    position: absolute;
    bottom: -1px;
    left: 35%; right: 35%;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }

  /* ========== 表单元素 ========== */
  .form-group {
    display: flex;
    gap: 18px;
    align-items: flex-end;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 32px;
  }

  .form-group label {
    display: flex;
    flex-direction: column;
    gap: 4px;
    font-family: "Noto Serif SC", "STSong", "SimSun", serif;
    font-size: 0.9rem;
    color: var(--ink-light);
    letter-spacing: 0.15em;
  }

  .form-group select,
  .form-group input[type="number"] {
    font-family: "Noto Serif SC", "KaiTi", "STKaiti", serif;
    font-size: 1.05rem;
    padding: 10px 16px;
    border: 1px solid var(--border);
    border-radius: 3px;
    background: #fffdf7;
    color: var(--ink);
    min-width: 110px;
    text-align: center;
    transition: border-color 0.2s;
    box-shadow: inset 0 1px 3px rgba(0,0,0,0.04);
  }

  .form-group select:focus,
  .form-group input:focus {
    outline: none;
    border-color: var(--gold);
    box-shadow: 0 0 0 2px rgba(184, 149, 42, 0.15);
  }

  .btn {
    font-family: "KaiTi", "STKaiti", "KaiTi_GB2312", "Noto Serif SC", serif;
    font-size: 1.05rem;
    padding: 10px 32px;
    border: 1px solid var(--gold);
    background: linear-gradient(180deg, #c9a630 0%, #9a7d24 100%);
    color: #fffdf7;
    border-radius: 3px;
    cursor: pointer;
    letter-spacing: 0.2em;
    transition: all 0.2s;
    text-shadow: 0 1px 2px rgba(0,0,0,0.2);
    box-shadow: 0 2px 6px rgba(184, 149, 42, 0.2);
  }

  .btn:hover {
    background: linear-gradient(180deg, #d4b53a 0%, #b8952a 100%);
    box-shadow: 0 3px 12px rgba(184, 149, 42, 0.35);
    transform: translateY(-1px);
  }

  .btn:active {
    transform: translateY(0) scale(0.98);
    box-shadow: 0 1px 4px rgba(184, 149, 42, 0.2);
  }

  /* ========== 结果展示 ========== */
  .result-area {
    display: none;
  }

  .result-area.show {
    display: block;
    animation: fadeIn 0.5s ease;
  }

  .result-header {
    text-align: center;
    margin-bottom: 24px;
  }

  .result-header .ganzhi {
    font-family: "KaiTi", "STKaiti", "KaiTi_GB2312", "AR PL UKai CN", "AR PL UKai HK", "SimSun", serif;
    font-size: 2.2rem;
    color: var(--red-seal);
    letter-spacing: 0.25em;
    font-weight: 400;
    text-shadow: 0 1px 2px rgba(194, 59, 39, 0.1);
  }

  .result-header .year-label {
    font-size: 0.85rem;
    color: var(--ink-faint);
    margin-top: 6px;
    letter-spacing: 0.1em;
  }

  /* ========== 信息网格 ========== */
  .info-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 14px;
    margin: 20px 0;
  }

  .info-item {
    text-align: center;
    padding: 16px 12px;
    border: 1px solid var(--border-light);
    border-radius: 3px;
    background: rgba(255, 253, 247, 0.6);
    transition: all 0.2s;
  }

  .info-item:hover {
    box-shadow: 0 2px 8px var(--shadow);
    border-color: var(--gold-light);
  }

  .info-item .label {
    font-family: "STSong", "SimSun", serif;
    font-size: 0.78rem;
    color: var(--ink-faint);
    letter-spacing: 0.2em;
    margin-bottom: 6px;
  }

  .info-item .value {
    font-family: "Noto Serif SC", "STSong", "SimSun", serif;
    font-size: 1.1rem;
    color: var(--ink);
  }

  .info-item .value.highlight {
    color: var(--red-seal);
    font-weight: 600;
  }

  /* ========== 经文区块 ========== */
  .jingwen {
    margin: 24px 0;
    padding: 22px 26px;
    border-left: 3px solid var(--gold);
    background: linear-gradient(135deg, rgba(184, 149, 42, 0.04) 0%, rgba(184, 149, 42, 0.02) 100%);
    border-radius: 0 3px 3px 0;
  }

  .jingwen .source {
    font-family: "STSong", "SimSun", serif;
    font-size: 0.78rem;
    color: var(--gold);
    letter-spacing: 0.2em;
    margin-bottom: 10px;
  }

  .jingwen .classical {
    font-family: "KaiTi", "STKaiti", "KaiTi_GB2312", "SimSun", serif;
    font-size: 1.08rem;
    color: var(--ink);
    line-height: 2.2;
    letter-spacing: 0.08em;
    margin-bottom: 14px;
  }

  .jingwen .modern {
    font-family: "Noto Serif SC", "KaiTi", "STKaiti", "SimSun", serif;
    font-size: 0.92rem;
    color: var(--ink-light);
    line-height: 2;
    border-top: 1px dashed var(--border-light);
    padding-top: 14px;
  }

  .jingwen .modern::before {
    content: '【白话解】';
    font-family: "STSong", "SimSun", serif;
    font-size: 0.78rem;
    color: var(--gold);
    letter-spacing: 0.2em;
  }

  /* ========== 节气表 ========== */
  .jieqi-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
    gap: 8px;
    margin: 18px 0;
  }

  .jieqi-item {
    text-align: center;
    padding: 10px 6px;
    font-family: "Noto Serif SC", "STSong", "SimSun", serif;
    font-size: 0.85rem;
    border: 1px solid var(--border-light);
    border-radius: 3px;
    background: rgba(255, 253, 247, 0.4);
    transition: all 0.2s;
  }

  .jieqi-item.current {
    border-color: var(--gold);
    background: rgba(184, 149, 42, 0.12);
    color: var(--gold);
    font-weight: 600;
    box-shadow: 0 0 0 1px var(--gold-light);
  }

  .jieqi-item .jq-name {
    font-family: "KaiTi", "STKaiti", serif;
    font-size: 1rem;
    margin-bottom: 3px;
  }

  .jieqi-item .jq-date {
    font-size: 0.72rem;
    color: var(--ink-faint);
  }

  /* ========== 疾病提示 ========== */
  .disease-card {
    padding: 18px 22px;
    margin: 14px 0;
    border-radius: 3px;
    border: 1px solid;
    transition: all 0.2s;
  }

  .disease-card:hover {
    box-shadow: 0 2px 8px var(--shadow);
  }

  .disease-card.high {
    border-color: var(--red-seal);
    background: rgba(194, 59, 39, 0.03);
  }

  .disease-card.medium {
    border-color: var(--gold);
    background: rgba(184, 149, 42, 0.03);
  }

  .disease-card.low {
    border-color: var(--accent-green);
    background: rgba(90, 122, 90, 0.03);
  }

  .disease-card .disease-title {
    font-family: "STSong", "SimSun", serif;
    font-size: 0.88rem;
    letter-spacing: 0.15em;
    margin-bottom: 8px;
  }

  .disease-card.high .disease-title { color: var(--red-seal); }
  .disease-card.medium .disease-title { color: var(--gold); }
  .disease-card.low .disease-title { color: var(--accent-green); }

  /* ========== 灾害预测 ========== */
  .disaster-item {
    padding: 18px 22px;
    margin: 14px 0;
    border-left: 3px solid var(--accent-warm);
    background: rgba(139, 69, 19, 0.03);
    border-radius: 0 3px 3px 0;
  }

  .disaster-item .disaster-type {
    font-family: "STSong", "SimSun", serif;
    font-size: 0.88rem;
    color: var(--accent-warm);
    letter-spacing: 0.2em;
    margin-bottom: 6px;
  }

  .disaster-item .disaster-desc {
    font-size: 0.95rem;
    line-height: 1.9;
  }

  /* ========== 分隔线 ========== */
  .divider {
    text-align: center;
    margin: 28px 0;
    color: var(--border);
    font-size: 0.85rem;
    letter-spacing: 0.5em;
    font-family: "STSong", "SimSun", serif;
  }

  .divider::before, .divider::after {
    content: '─── ';
  }
  .divider::after {
    content: ' ───';
  }

  /* ========== 六步气位表格 ========== */
  .qibiao {
    width: 100%;
    border-collapse: collapse;
    font-family: "Noto Serif SC", "STSong", "SimSun", serif;
    font-size: 0.9rem;
    margin: 16px 0;
  }

  .qibiao thead th {
    padding: 10px 8px;
    text-align: center;
    color: var(--ink-faint);
    font-weight: 400;
    font-family: "STSong", "SimSun", serif;
    letter-spacing: 0.15em;
    font-size: 0.82rem;
    border-bottom: 1px solid var(--border);
  }

  .qibiao tbody td {
    padding: 10px 8px;
    text-align: center;
    border-bottom: 1px solid var(--border-light);
  }

  .qibiao tbody tr:hover {
    background: rgba(184, 149, 42, 0.04);
  }

  /* ========== 页脚 ========== */
  footer {
    text-align: center;
    padding: 36px 24px;
    background:
      linear-gradient(180deg, var(--bg-deep) 0%, #2a2218 100%);
    color: var(--paper-dark);
    font-size: 0.82rem;
    letter-spacing: 0.15em;
    border-top: 2px solid var(--gold);
  }

  footer .footer-quote {
    font-family: "KaiTi", "STKaiti", "KaiTi_GB2312", "SimSun", serif;
    font-style: italic;
    margin-bottom: 8px;
    color: var(--gold-light);
    font-size: 0.95rem;
    letter-spacing: 0.2em;
  }

  footer .footer-source {
    font-family: "STSong", "SimSun", serif;
    letter-spacing: 0.25em;
    color: var(--gold);
    opacity: 0.7;
  }

  /* ========== 响应式 ========== */
  @media (max-width: 600px) {
    .tab-btn { padding: 14px 18px; font-size: 0.92rem; }
    .scroll-card { padding: 24px 18px; }
    .form-group { flex-direction: column; align-items: stretch; }
    .jieqi-grid { grid-template-columns: repeat(3, 1fr); }
    .info-grid { grid-template-columns: repeat(2, 1fr); }
    header h1 { letter-spacing: 0.15em; }
    .qibiao { font-size: 0.8rem; }
  }
</style>
</head>
<body>

<!-- ===== 页首 ===== -->
<header>
  <div class="header-ornament">☰ ☱ ☲ ☳ ☴ ☵ ☶ ☷</div>
  <h1>五运六气</h1>
  <div class="subtitle">黄帝内经 · 运气学说查询</div>
  <div class="seal">素 问</div>
</header>

<!-- ===== 导航 ===== -->
<nav class="tabs">
  <button class="tab-btn active" data-tab="year">
    <span class="tab-icon">📅</span>年运查询
  </button>
  <button class="tab-btn" data-tab="personal">
    <span class="tab-icon">👤</span>个人运气
  </button>
  <button class="tab-btn" data-tab="weather">
    <span class="tab-icon">🌤</span>天气预测
  </button>
</nav>

<!-- ===== 内容区 ===== -->
<div class="container">

<!-- ===== 第一面板：年运查询 ===== -->
<section id="panel-year" class="panel active">
  <div class="scroll-card">
    <h2 class="section-title">年运查询</h2>
    <p style="text-align:center;color:var(--ink-faint);font-size:0.92rem;margin-bottom:24px;font-family:'Noto Serif SC',serif;">
      输入年份，查询该年天干地支、五运六气，及《黄帝内经》相关原文
    </p>
    <div class="form-group">
      <label>
        <span>年份</span>
        <input type="number" id="year-input" min="1" max="9999" value="2026">
      </label>
      <button class="btn" onclick="queryYear()">查 询</button>
    </div>

    <div id="year-result" class="result-area"></div>
  </div>
</section>

<!-- ===== 第二面板：个人运气 ===== -->
<section id="panel-personal" class="panel">
  <div class="scroll-card">
    <h2 class="section-title">个人运气查询</h2>
    <p style="text-align:center;color:var(--ink-faint);font-size:0.92rem;margin-bottom:24px;font-family:'Noto Serif SC',serif;">
      输入公历出生日期，推算先天运气体质及易发疾病
    </p>
    <div class="form-group">
      <label>
        <span>年</span>
        <input type="number" id="birth-year" min="1900" max="2100" value="1990">
      </label>
      <label>
        <span>月</span>
        <select id="birth-month">
          <option value="1">一月</option><option value="2">二月</option>
          <option value="3">三月</option><option value="4">四月</option>
          <option value="5">五月</option><option value="6">六月</option>
          <option value="7">七月</option><option value="8">八月</option>
          <option value="9">九月</option><option value="10">十月</option>
          <option value="11">十一月</option><option value="12">十二月</option>
        </select>
      </label>
      <label>
        <span>日</span>
        <select id="birth-day"></select>
      </label>
      <button class="btn" onclick="queryPersonal()">查 询</button>
    </div>

    <div id="personal-result" class="result-area"></div>
  </div>
</section>

<!-- ===== 第三面板：天气预测 ===== -->
<section id="panel-weather" class="panel">
  <div class="scroll-card">
    <h2 class="section-title">天气灾害预测</h2>
    <p style="text-align:center;color:var(--ink-faint);font-size:0.92rem;margin-bottom:24px;font-family:'Noto Serif SC',serif;">
      据《内经》五运六气理论，推演当年气候特征与灾害倾向
    </p>
    <div class="form-group">
      <label>
        <span>年份</span>
        <input type="number" id="weather-year" min="1" max="9999" value="2026">
      </label>
      <button class="btn" onclick="queryWeather()">推 演</button>
    </div>

    <div id="weather-result" class="result-area"></div>
  </div>
</section>

</div><!-- .container -->

<!-- ===== 页脚 ===== -->
<footer>
  <div class="footer-quote">"上古之人，其知道者，法于阴阳，和于术数"</div>
  <div class="footer-source">——《黄帝内经 · 素问 · 上古天真论》——</div>
  <div style="margin-top:10px;opacity:0.5;">五运六气查询 · 仅供学习参考</div>
</footer>

<script>

  // ===== 工具函数 =====
  function renderJingwenBlock(source, classical, modern) {
    var html = '<div class="jingwen">';
    html += '<div class="source">' + source + '</div>';
    if (classical) {
      html += '<div class="classical">' + classical + '</div>';
    }
    html += '<div class="modern">' + modern + '</div>';
    html += '</div>';
    return html;
  }

  // ===== 年运查询 =====

    try {
      var yearInput = document.getElementById('year-input');
      if (!yearInput) return;
      var year = parseInt(yearInput.value);

      var gz = getGanZhi(year);
      var yun = getYun(gz.gan);
      var guo = getGuo(gz.gan);
      var yunKey = yun + (guo !== '不及' ? '' : '不及');
      var sz = getSiZai(gz.zhi);
      var lb = getLiuBuSiQi(gz.zhi);

      var now = new Date();
      var curJq = getCurrentJieqi(now.getMonth() + 1, now.getDate());

      var jw = JINGWEN[yunKey] || {
        source: '《素问》相关篇章',
        classical: '暂无具体经文记录',
        modern: '此运特征待补充'
      };

      var stjw = SITIAN_JINGWEN[sz.si] || {
        source: '《素问》', classical: '暂无记录', modern: '待补充'
      };
      var zqjw = ZAIQUAN_JINGWEN[sz.zai] || {
        source: '《素问》', classical: '暂无记录', modern: '待补充'
      };

      var qiSteps = ['初之气','二之气','三之气（司天）','四之气','五之气','终之气（在泉）'];
      var qiPeriods = ['大寒-春分','春分-小满','小满-大暑','大暑-秋分','秋分-小雪','小雪-大寒'];

      var html = '';
      html += '<div class="result-header">';
      html += '<div class="ganzhi">' + gz.full + '年</div>';
      html += '<div class="year-label">公元 ' + year + ' 年 · 天干地支纪年</div>';
      html += '</div>';

      html += '<div class="info-grid">';
      html += '<div class="info-item"><div class="label">天干</div><div class="value">' + gz.gan + '（' + guo + '）</div></div>';

      html += '<div class="info-item"><div class="label">在泉</div><div class="value highlight">' + sz.zai + '</div></div>';

      html += '<th>气步</th><th>主气</th><th>客气</th><th>时段</th>';
      html += '</tr></thead><tbody>';
      for (var i = 0; i < 6; i++) {
        var isSpecial = (i === 2 || i === 5);
        html += '<tr>';
        html += '<td style="' + (isSpecial ? 'color:var(--red-seal);font-weight:600;' : '') + '">' + qiSteps[i] + '</td>';

        html += '<td style="' + (isSpecial ? 'color:var(--red-seal);' : '') + '">' + lb.keqi[i] + '</td>';

        ? '金运太过，燥气偏盛。易患干咳少痰、咽干鼻燥、皮肤干裂、大便干结、易感冒等肺燥证。秋季尤需注意，可能诱发呼吸道疾病。'

      '水': isGuo

    };
    return descs[yun];
  }

  // ===== 天气灾害 =====
  window.queryWeather = function() {
    try {
      var yearInput = document.getElementById('weather-year');
      if (!yearInput) { alert('页面元素未找到，请刷新页面'); return; }
      var year = parseInt(yearInput.value);
      if (isNaN(year) || year < 1) { alert('请输入有效年份'); return; }

      var gz = getGanZhi(year);
      var yun = getYun(gz.gan);
      var guo = getGuo(gz.gan);
      var yunKey = yun + '运' + (guo === '不及' ? '不及' : '');
      var sz = getSiZai(gz.zhi);

      console.log('[debug] 年=' + year + ', 干支=' + gz.full + ', 运=' + yun + ', 太过/不及=' + guo + ', yunKey=' + yunKey);

      var wp = WEATHER_PREDICTION[yunKey];
      if (!wp) {
        alert('未找到对应的天气预测数据（键值=' + yunKey + '），请尝试其他年份。');
        return;
      }

      var html = '';
      html += '<div class="result-header">';
      html += '<div class="ganzhi">' + gz.full + '年 · 气候推演</div>';
      html += '<div class="year-label">' + year + ' 年五运六气灾害预测</div>';
      html += '</div>';

      html += '<div class="info-grid">';
      html += '<div class="info-item"><div class="label">大运</div><div class="value highlight">' + yun + '运 · ' + guo + '</div></div>';
      html += '<div class="info-item"><div class="label">司天</div><div class="value">' + sz.si + '</div></div>';
      html += '<div class="info-item"><div class="label">在泉</div><div class="value">' + sz.zai + '</div></div>';
      html += '</div>';

      html += '<div class="divider">全年气候总势</div>';
      html += '<p style="text-align:center;font-size:0.95rem;line-height:1.9;margin-bottom:20px;">' + wp.overall + '</p>';

      html += '<div class="divider">灾害预测详情</div>';
      for (var i = 0; i < wp.disasters.length; i++) {
        var d = wp.disasters[i];
        html += '<div class="disaster-item">';
        html += '<div class="disaster-type">⚠ ' + d.type + '</div>';
        html += '<div class="disaster-desc">' + d.desc + '</div>';
        html += '</div>';
      }

      html += '<div class="divider">经典依据</div>';
      html += renderJingwenBlock(wp.source, '', wp.modern);

      html += '<div class="divider">司天在泉气候影响</div>';
      html += '<p style="font-size:0.92rem;line-height:1.9;margin-bottom:16px;">';
      html += '<strong style="color:var(--ink-light);">司天（' + sz.si + '）影响上半年：</strong>';
      html += getSiTianWeather(sz.si);
      html += '</p>';
      html += '<p style="font-size:0.92rem;line-height:1.9;margin-bottom:16px;">';
      html += '<strong style="color:var(--ink-light);">在泉（' + sz.zai + '）影响下半年：</strong>';
      html += getZaiQuanWeather(sz.zai);
      html += '</p>';

      html += '<div style="margin-top:24px;padding:16px;background:rgba(194,59,39,0.04);border:1px dashed var(--red-seal);border-radius:3px;">';
      html += '<p style="font-size:0.82rem;color:var(--ink-faint);text-align:center;line-height:1.8;">';
      html += '⚠ 以上预测基于《黄帝内经》五运六气理论推演，属传统中医学说范畴，<br>';
      html += '仅供学习研究和文化参考，不作为现代气象学预测依据。';
      html += '</p></div>';

      var resultEl = document.getElementById('weather-result');
      if (!resultEl) { alert('结果容器未找到，请刷新页面'); return; }
      resultEl.innerHTML = html;
      resultEl.classList.add('show');
    } catch (e) {
      console.error('天气预测错误:', e);
      alert('推演出错：' + e.message);
    }
  };

  function getSiTianWeather(si) {
    var weathers = {
      '少阴君火': '上半年偏热，气温偏高，春夏可能出现异常高温天气。心火当令，需注意防暑降温。',
      '太阴湿土': '上半年偏湿，降雨偏多，湿度较大。春夏可能出现连阴雨天气，需注意防涝防潮。',
      '少阳相火': '上半年火气偏盛，气温偏高，可能出现热浪。春末夏初需防范高温及强对流天气。',
      '阳明燥金': '上半年偏燥，空气干燥，降水偏少。春季可能出现春旱，需注意防火及呼吸道防护。',
      '太阳寒水': '上半年偏寒，气温偏低，可能出现倒春寒。春季回暖较慢，需注意防寒保暖。',
      '厥阴风木': '上半年风大，气流不稳，天气多变。春季多风，可能出现大风、沙尘天气，气温波动大。'
    };
    return weathers[si] || '待补充';
  }

  function getZaiQuanWeather(zai) {
    var weathers = {
      '阳明燥金': '下半年偏燥，秋季干燥明显，降水偏少。需注意秋旱及防火。',
      '太阳寒水': '下半年偏寒，冬季严寒，可能出现极端低温。需注意防寒防冻。',
      '厥阴风木': '下半年风气偏盛，秋季多风，天气变化频繁。需注意防风及气温骤变。',
      '少阴君火': '下半年偏热，冬季可能偏暖（暖冬）。需注意暖冬对农业的影响。',
      '太阴湿土': '下半年偏湿，秋雨较多，可能出现秋涝。需注意防涝防潮。',
      '少阳相火': '下半年火气仍存，秋老虎明显，气温偏高。需注意防暑及抗旱。'
    };
    return weathers[zai] || '待补充';
  }

  // ===== 标签切换 =====
  document.querySelectorAll('.tab-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
      document.querySelectorAll('.panel').forEach(function(p) { p.classList.remove('active'); });
      btn.classList.add('active');
      document.getElementById('panel-' + btn.getAttribute('data-tab')).classList.add('active');
    });
  });

  // ===== 初始化日期下拉 =====
  var sel = document.getElementById('birth-day');
  for (var d = 1; d <= 31; d++) {
    var opt = document.createElement('option');
    opt.value = d;
    opt.textContent = d + '日';
    sel.appendChild(opt);
  }
  sel.value = 15;

  // ===== 页面加载后自动查询当年 =====
  window.addEventListener('DOMContentLoaded', function() {
    queryYear();
  });

})();
</script>
